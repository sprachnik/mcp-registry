[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache headers live in the _headers file (Netlify reads both, but _headers
# is the authoritative source here so we don't accidentally diverge).
# Keeping a single representative rule here so future contributors know to
# check _headers.

[build]
  publish = "."
  command = ""  # No build step - pure static site!

[build.environment]
  NODE_VERSION = "18"

# No redirects needed for static site - this was causing issues
